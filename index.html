<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="グエンタインゴックの可愛いブログ！毎日楽しい投稿をお届けします。">
    <meta name="keywords" content="ブログ, 可愛い, 毎日, 投稿, 画像">
    <title>＊グエンタインゴックの天才ブログ＊</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>＊グエンタインゴックの天才ブログ＊</h1>
        <p>初めまして、毎日楽しく生きたい系ブロガーです。毎日投稿できるように応援してね！！！</p>
    </header>

    <main>
        <section id="new-post">
            <h2>✨ 新しい投稿を作成 ✨</h2>
            <form id="post-form">
                <label for="content">投稿内容:</label>
                <textarea id="content" placeholder="かわいいことを書いてね... 💕"></textarea>
                
                <label for="image">画像を選択:</label>
                <input type="file" id="image" accept="image/*">
                
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter password to post" required>
                
                <button type="submit">投稿する ✨</button>
            </form>
        </section>

        <section id="posts">
            <h2>📝 投稿一覧</h2>
            <div id="posts-container">
                <!-- Posts sẽ được thêm vào đây -->
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <script src="function.js"></script>
</body>
</html>
